name: Build Android

on:
  workflow_call:
    inputs:
      upload-artifact:
        type: boolean
        default: true
      tag-name:
        type: string
        default: "draft"
      channel:
        type: string
        default: "dev"

env:
  IS_GITHUB_ACTIONS: 1
  CHANNEL: "${{ inputs.channel }}"
  FLUTTER_VERSION: "3.38.5"
  UPLOAD_ARTIFACT: "${{ inputs.upload-artifact }}"
  TAG_NAME: "${{ inputs.tag-name }}"
  TARGET_NAME_apk: "WEPBOX-Android"
  TARGET_NAME_aab: "WEPBOX-Android"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2.21.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Prepare Android
        run: make android-apk-prepare

      - name: Test
        run: flutter test

  build:
    needs: test
    runs-on: ubuntu-latest
    permissions: write-all
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: android-apk
            targets: apk
          - platform: android-aab
            targets: aab

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2.21.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Setup dependencies
        run: |
          make ${{ matrix.platform }}-install-deps
          echo "$HOME/.pub-cache/bin" >> "$GITHUB_PATH"

      - name: Setup Android signing
        env:
          ANDROID_SIGNING_KEY: ${{ secrets.ANDROID_SIGNING_KEY }}
          ANDROID_SIGNING_STORE_PASSWORD: ${{ secrets.ANDROID_SIGNING_STORE_PASSWORD }}
          ANDROID_SIGNING_KEY_PASSWORD: ${{ secrets.ANDROID_SIGNING_KEY_PASSWORD }}
          ANDROID_SIGNING_KEY_ALIAS: ${{ secrets.ANDROID_SIGNING_KEY_ALIAS }}
        run: |
          if [ -n "$ANDROID_SIGNING_KEY" ]; then
            echo "$ANDROID_SIGNING_KEY" | base64 --decode > android/release.keystore
            {
              echo "storeFile=$(pwd)/android/release.keystore"
              echo "storePassword=$ANDROID_SIGNING_STORE_PASSWORD"
              echo "keyPassword=$ANDROID_SIGNING_KEY_PASSWORD"
              echo "keyAlias=$ANDROID_SIGNING_KEY_ALIAS"
            } > android/key.properties
            echo "Android release signing configured."
          else
            echo "ANDROID_SIGNING_KEY is not set; Gradle will fall back to debug signing."
          fi

      - name: Prepare Android
        run: make ${{ matrix.platform }}-prepare

      - name: Build Android
        run: make ${{ matrix.platform }}-release

      - name: Copy APK outputs
        if: matrix.platform == 'android-apk'
        run: |
          mkdir -p out
          cp ./build/app/outputs/flutter-apk/*arm64-v8a*.apk out/${TARGET_NAME_apk}-arm64.apk || true
          cp ./build/app/outputs/flutter-apk/*armeabi-v7a*.apk out/${TARGET_NAME_apk}-arm7.apk || true
          cp ./build/app/outputs/flutter-apk/*x86_64*.apk out/${TARGET_NAME_apk}-x86_64.apk || true
          cp ./build/app/outputs/flutter-apk/app-release.apk out/${TARGET_NAME_apk}-universal.apk || true
          ls -R out

      - name: Copy AAB output
        if: matrix.platform == 'android-aab'
        run: |
          mkdir -p out
          cp ./build/app/outputs/bundle/release/app-release.aab out/${TARGET_NAME_aab}-market.aab
          ls -R out

      - name: Upload Artifact
        if: env.UPLOAD_ARTIFACT == 'true'
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.platform }}
          path: ./out
          retention-days: 7

  upload-release:
    if: ${{ inputs.upload-artifact && inputs.tag-name != 'draft' }}
    needs: build
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download Artifact
        uses: actions/download-artifact@v7
        with:
          merge-multiple: true
          pattern: "*"
          path: ./out/

      - name: Prepare release notes
        run: sed 's|RELEASE_TAG|${{ env.TAG_NAME }}|g' ./.github/release_message.md > release.md

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          prerelease: ${{ env.CHANNEL == 'dev' }}
          tag_name: ${{ env.TAG_NAME }}
          body_path: ./release.md
          files: ./out/*
